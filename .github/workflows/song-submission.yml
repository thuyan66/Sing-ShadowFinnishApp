name: Song Submission

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  process-submission:
    if: startsWith(github.event.issue.title, '[Song Submission]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate, dedupe, and merge submission
        uses: actions/github-script@v7
        with:
          script: |
            const path = require('path');
            const run = require(path.join(process.env.GITHUB_WORKSPACE, '.github', 'scripts', 'process-submission.js'));
            await run({ github, context, core });
